---
- name: Create DevSpaces OAuth watcher namespace
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ ocp4_workload_cluster_mta_devspaces_watcher_namespace }}"

- name: Deploy DevSpaces OAuth watcher resources
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', item) }}"
  loop:
  - devspaces-watcher-serviceaccount.yaml.j2
  - devspaces-watcher-clusterrole.yaml.j2
  - devspaces-watcher-clusterrolebinding.yaml.j2
  - devspaces-watcher-configmap.yaml.j2
  - devspaces-watcher-deployment.yaml.j2

- name: Wait for DevSpaces OAuth watcher to be ready
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: devspaces-oauth-watcher
    namespace: "{{ ocp4_workload_cluster_mta_devspaces_watcher_namespace }}"
  register: r_watcher_deployment
  retries: 30
  delay: 10
  until:
  - r_watcher_deployment.resources is defined
  - r_watcher_deployment.resources | length > 0
  - r_watcher_deployment.resources[0].status.availableReplicas is defined
  - r_watcher_deployment.resources[0].status.availableReplicas | int >= 1

- name: Save DevSpaces OAuth watcher info
  agnosticd.core.agnosticd_user_info:
    data:
      devspaces_oauth_watcher_namespace: "{{ ocp4_workload_cluster_mta_devspaces_watcher_namespace }}"
      devspaces_oauth_watcher_status: "Deployed and running"
