---
- name: Check Openshift Gitops / ArgoCD installation
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: ArgoCD
    name: openshift-gitops
    namespace: openshift-gitops
  register: r_argocd

- name: Assert that GitOps is installed
  ansible.builtin.assert:
    that: r_argocd.resources | length > 0
    msg: "Openshift Gitops / ArgoCD is not installed."

- name: Check ArgoCD AppProject exists
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: AppProject
    name: "{{ ocp4_workload_tenant_mta_user_app_project_prefix }}-{{ ocp4_workload_tenant_mta_user }}"
    namespace: openshift-gitops
  register: r_appproject

- name: Assert that ArgoCD AppProject exists
  ansible.builtin.assert:
    that: r_appproject.resources | length > 0
    msg: "ArgoCD AppProject '{{ ocp4_workload_tenant_mta_user_app_project_prefix }}-{{ ocp4_workload_tenant_mta_user }}' does not exist in openshift-gitops namespace."

- name: Create vault secrets for MTA LLM
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp4_workload_tenant_mta_vault_namespace }}"
    pod: vault-0
    command: >-
      vault kv put kv/secrets/mta/llm
      base_url='{{ lookup('agnosticd.core.agnosticd_user_data', 'litellm_api_base_url') }}'
      api_key='{{ lookup('agnosticd.core.agnosticd_user_data', 'litellm_virtual_key') }}'

- name: Install MTA (single user)
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'application.yaml.j2') }}"

- name: Wait for OAuth proxy route (when enabled)
  when: ocp4_workload_tenant_mta_oauth_proxy_enabled | bool
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    name: "{{ ocp4_workload_tenant_mta_oauth_proxy_route_name }}"
    namespace: "{{ ocp4_workload_tenant_mta_namespace }}"
  register: r_oauth_route
  retries: 30
  delay: 10
  until:
  - r_oauth_route.resources | length > 0
  - r_oauth_route.resources[0].spec.host is defined

- name: Save MTA user info (OAuth proxy enabled)
  when: ocp4_workload_tenant_mta_oauth_proxy_enabled | bool
  agnosticd.core.agnosticd_user_info:
    data:
      mta_url: "https://{{ r_oauth_route.resources[0].spec.host }}"
      mta_api_url: "https://{{ r_oauth_route.resources[0].spec.host }}/hub"
      mta_namespace: "{{ ocp4_workload_tenant_mta_namespace }}"
      mta_auth: "OpenShift OAuth - use your OpenShift credentials"
      tackle_user: "{{ ocp4_workload_tenant_mta_user }}"
      tackle_password: "{{ ocp4_workload_tenant_mta_password }}"

- name: Save MTA user info (OAuth proxy disabled)
  when: not ocp4_workload_tenant_mta_oauth_proxy_enabled | bool
  agnosticd.core.agnosticd_user_info:
    data:
      mta_url: >-
        https://mta-{{ ocp4_workload_tenant_mta_namespace }}.{{
        openshift_cluster_ingress_domain }}
      mta_api_url: >-
        https://mta-{{ ocp4_workload_tenant_mta_namespace }}.{{
        openshift_cluster_ingress_domain }}/hub
      mta_namespace: "{{ ocp4_workload_tenant_mta_namespace }}"
