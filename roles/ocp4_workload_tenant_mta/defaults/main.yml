---
# Helm Chart to deploy
ocp4_workload_tenant_mta_repo: https://github.com/redhat-gpte-devopsautomation/agnosticd_workload_helm_charts.git
# Tag to deploy
ocp4_workload_tenant_mta_repo_tag: main
ocp4_workload_tenant_mta_repo_path: mta8

ocp4_workload_tenant_mta_user: user-{{ guid }}
ocp4_workload_tenant_mta_namespace: "{{ ocp4_workload_tenant_mta_user }}-mta"

ocp4_workload_tenant_mta_deploy_operator: true
ocp4_workload_tenant_mta_channel: stable-v8.0

# Catalog Source Configuration
# Set to true to use a custom catalog source snapshot
ocp4_workload_tenant_mta_use_catalog_snapshot: false
ocp4_workload_tenant_mta_catalog_source_name: mta-operator-fbc
ocp4_workload_tenant_mta_catalog_source_namespace: openshift-marketplace
ocp4_workload_tenant_mta_catalog_source_image: quay.io/redhat-user-workloads/ocp-art-tenant/art-fbc
ocp4_workload_tenant_mta_catalog_source_tag: mta-operator-fbc-8.1.0-20260127104014

# Role to grant users for the tackle namespace
ocp4_workload_tenant_mta_role: admin

ocp4_workload_tenant_mta_vault_namespace: vault

# Seed Tackle with information
# When seeding is enabled authentication must be turned off
# (until this is fixed in the operator)
ocp4_workload_tenant_mta_seed: false

# Image for the job to seed tackle. The image must have the data to be seeded inside
# See https://github.com/redhat-gpte-devopsautomation/tackle2-setup-container.git
# Tag should match version of operator channel subscription
# "stable-v2.0" -> "1.0" (legacy tag name)
# "stable-v2.1" -> "v2.1.1" (new matching tag names)
ocp4_workload_tenant_mta_seed_image: quay.io/gpte-devops-automation/tackle2-setup
ocp4_workload_tenant_mta_seed_tag: "release-0.8-mta8"
ocp4_workload_tenant_mta_seed_pull_policy: IfNotPresent

# These are hardcoded and can't be changed at the moment, first login requires changing
# Disable authentication by setting ocp4_workload_tenant_mta_feature_auth_required: false
# ocp4_workload_tenant_mta_user: admin
# ocp4_workload_tenant_mta_password: password

# ArgoCD project to deploy the applications into
ocp4_workload_tenant_mta_user_app_project_prefix: appproject

# --------------------------------
# Tackle V2 specific settings
# --------------------------------
# External Keycloak Authentication
# Set to true to use cluster-wide external Keycloak
# Set to false to use MTA's embedded Keycloak or no authentication
ocp4_workload_tenant_mta_use_external_keycloak: false

# External Keycloak configuration (set via vars file when use_external_keycloak: true)
ocp4_workload_tenant_mta_keycloak_namespace: keycloak
ocp4_workload_tenant_mta_keycloak_route_name: keycloak
ocp4_workload_tenant_mta_keycloak_realm: ""
ocp4_workload_tenant_mta_keycloak_client_id: ""
ocp4_workload_tenant_mta_keycloak_client_secret: ""

# Legacy authentication setting
# When ocp4_workload_tenant_mta_use_external_keycloak is false:
#   - true: MTA deploys embedded Keycloak
#   - false: No authentication
ocp4_workload_tenant_mta_feature_auth_required: false

# Storage settings
ocp4_workload_tenant_mta_maven_data_volume_size: 10Gi
ocp4_workload_tenant_mta_hub_database_volume_size: 5Gi
ocp4_workload_tenant_mta_keycloak_database_data_volume_size: 1Gi
ocp4_workload_tenant_mta_pathfinder_database_data_volume_size: 1Gi
ocp4_workload_tenant_mta_rwx_supported: false

ocp4_workload_tenant_mta_kai_solution_server_enabled: false
ocp4_workload_tenant_mta_kai_llm_provider: openai
ocp4_workload_tenant_mta_kai_llm_model: llama-scout-17b