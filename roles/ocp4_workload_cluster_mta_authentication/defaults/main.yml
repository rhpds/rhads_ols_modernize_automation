---
# Authentication type for MTA
# Options: keycloak, none
ocp4_workload_cluster_mta_authentication_type: keycloak

# Keycloak Configuration
ocp4_workload_cluster_mta_authentication_keycloak_namespace: keycloak
ocp4_workload_cluster_mta_authentication_keycloak_route_name: keycloak
ocp4_workload_cluster_mta_authentication_keycloak_realm: ""

# MTA Configuration
ocp4_workload_cluster_mta_authentication_mta_client_id: mta-client

# Optional client secret for confidential clients
# If set, the client will be configured as confidential instead of public
ocp4_workload_cluster_mta_authentication_client_secret: ""
